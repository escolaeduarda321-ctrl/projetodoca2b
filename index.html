<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Gerador de Frases</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
      width: 300px;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

    #resultado {
      margin-top: 20px;
      font-weight: bold;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Gerador de Frases</h1>

    <input type="text" id="nome" placeholder="Digite seu nome">
    <button onclick="gerarFrase()">Gerar Frase</button>

    <div id="resultado"></div>
  </div>

  <script>
    function gerarFrase() {
      const nome = document.getElementById('nome').value;
      const resultado = document.getElementById('resultado');

      if (nome.trim() === "") {
        resultado.innerText = "Por favor, digite um nome!";
        return;
      }

      const frases = [
        `Olá, ${nome}! Você é incrível!`,
        `${nome}, nunca desista dos seus sonhos!`,
        `Hoje é um ótimo dia para você, ${nome}!`,
        `${nome}, você pode conquistar o mundo!`
      ];

      const fraseAleatoria = frases[Math.floor(Math.random() * frases.length)];

      resultado.innerText = fraseAleatoria;
    }
  </script>
</body>
</html>
